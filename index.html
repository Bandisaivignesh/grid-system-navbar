<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Grid & Navbar</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">MyWebsite</a>

    <!-- Toggle button for mobile -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar links -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Services</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Contact</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ✅ GRID SYSTEM -->
<div class="container mt-5">
  <div class="row">
    <div class="col-md-4 bg-primary text-white p-3">
      Column 1
    </div>
    <div class="col-md-4 bg-success text-white p-3">
      Column 2
    </div>
    <div class="col-md-4 bg-danger text-white p-3">
      Column 3
    </div>
  </div>

  <!-- Another row -->
  <div class="row mt-4">
    <div class="col-sm-6 col-lg-3 bg-warning p-3">
      Box 1
    </div>
    <div class="col-sm-6 col-lg-3 bg-info p-3">
      Box 2
    </div>
    <div class="col-sm-6 col-lg-3 bg-secondary text-white p-3">
      Box 3
    </div>
    <div class="col-sm-6 col-lg-3 bg-dark text-white p-3">
      Box 4
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
